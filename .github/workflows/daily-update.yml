name: 每日股票数据更新

on:
  # 每天下午3:30自动运行（股市收盘后）
  schedule:
    - cron: '30 7 * * *'  # UTC时间 = 北京时间 15:30
  # 也可以手动触发
  workflow_dispatch:
  # 代码推送时触发（测试用）
  push:
    branches:
      - main
    paths:
      - 'scripts/daily-update.js'

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史，用于推送

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        run: npm install

      - name: 设置Git配置
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: 设置代理（可选，用于API请求）
        run: echo "需要代理请配置"

      - name: 运行每日更新脚本
        env:
          HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
          HTTPS_PROXY: ${{ secrets.HTTPS_PROXY }}
        run: |
          echo "=== 开始执行更新脚本 ==="
          node scripts/daily-update.js 2>&1
          echo "=== 脚本执行完成 ==="

      - name: 检查是否有更新
        id: check
        run: |
          if git diff --stat | grep -q "data-compressed.json"; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: 提交并推送更新
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git add data-compressed.json
          git commit -m "daily: 更新股票数据 $(date +'%Y-%m-%d')"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 记录更新结果
        if: steps.check.outputs.has_changes == 'true'
        run: echo "✅ 数据已更新并推送"
