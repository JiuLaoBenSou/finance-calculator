name: 每日股票数据更新

on:
  # 每天下午3:30自动运行（股市收盘后）
  schedule:
    - cron: '30 7 * * *'  # UTC时间 = 北京时间 15:30
  # 也可以手动触发
  workflow_dispatch:
  # 代码推送时触发（测试用）
  push:
    branches:
      - master
    paths:
      - 'scripts/daily-update.js'
      - '.github/workflows/daily-update.yml'

# 防止并发运行
concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        run: npm install

      - name: 设置Git配置
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: 测试腾讯API连接
        id: api-test
        run: |
          echo "=== 测试腾讯API连接 ==="
          RESPONSE=$(curl -s --connect-timeout 15 --max-time 20 "https://web.ifzq.gtimg.cn/appstock/app/fqkline/get?param=sh600519,day,,,1,qfq")
          echo "API响应: $RESPONSE"
          if echo "$RESPONSE" | grep -q "klines\|qfqday"; then
            echo "✅ 腾讯API连接成功"
            echo "api_status=ok" >> $GITHUB_OUTPUT
          else
            echo "❌ 腾讯API连接失败"
            echo "api_status=fail" >> $GITHUB_OUTPUT
          fi

      - name: 运行每日更新脚本
        if: steps.api-test.outputs.api_status == 'ok'
        run: |
          echo "=== 开始执行更新脚本 ==="
          echo "Node版本: $(node --version)"

          # 运行脚本（腾讯API不需要代理）
          node scripts/daily-update.js 2>&1

          echo "=== 脚本执行完成 ==="

      - name: 检查是否有更新
        id: check
        run: |
          echo "=== 检查数据变更 ==="
          if [ -n "$(git status --short data-chunks/)" ]; then
            echo "有数据变更:"
            git status --short data-chunks/
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "没有数据变更"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: 提交并推送更新
        if: steps.check.outputs.has_changes == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          echo "=== 提交并推送 ==="

          # 等待一下让远程稳定
          sleep 3

          # 获取远程最新并rebase
          git fetch origin

          # 检查是否有远程更新
          LOCAL_HEAD=$(git rev-parse HEAD)
          REMOTE_HEAD=$(git rev-parse origin/master)

          if [ "$LOCAL_HEAD" != "$REMOTE_HEAD" ]; then
            echo "远程有新内容，尝试合并..."
            git rebase origin/master || {
              echo "Rebase失败，尝试合并..."
              git merge origin/master --no-edit
            }
          fi

          # 设置push用的token
          PUSH_TOKEN="x-access-token:${{ github.token }}"
          PUSH_URL="https://${PUSH_TOKEN}@github.com/${{ github.repository }}.git"

          # 添加数据
          git add data-chunks/

          # 再次检查状态
          if git diff --cached --quiet; then
            echo "没有需要提交的变更"
            exit 0
          fi

          # 提交
          COMMIT_MSG="daily: 更新股票数据 $(date +'%Y-%m-%d')"
          echo "提交信息: ${COMMIT_MSG}"
          git commit -m "${COMMIT_MSG}"

          # 推送（带重试）
          for i in 1 2 3; do
            echo "尝试推送第${i}次..."
            if git push ${PUSH_URL} master; then
              echo "✅ 推送成功"
              exit 0
            fi
            echo "推送失败，等待5秒后重试..."
            sleep 5
            git fetch origin
            git rebase origin/master
          done

          echo "❌ 推送最终失败"

      - name: 成功结果
        if: steps.check.outputs.has_changes == 'true'
        run: |
          echo "✅ 数据已更新并推送"
          echo "更新日期: $(date +'%Y-%m-%d')"

      - name: 无需更新
        if: steps.check.outputs.has_changes != 'true'
        run: |
          echo "✅ 数据已是最新，无需更新"
          echo "检查时间: $(date +'%Y-%m-%d %H:%M:%S')"

      - name: API失败处理
        if: steps.api-test.outputs.api_status != 'ok'
        run: |
          echo "⚠️ 腾讯API连接失败"
          echo "请检查网络状况"
