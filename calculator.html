<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>投资计算器 - 金融工具箱</title>
  <link rel="stylesheet" href="css/style.css?v=20260311">
</head>
<body>
  <header class="header">
    <nav class="nav">
      <div class="logo">
        <div class="logo-icon">📊</div>
        <span>金融工具箱</span>
      </div>
      <button class="mobile-menu-btn">☰</button>
      <ul class="nav-links">
        <li><a href="index.html">首页</a></li>
        <li><a href="calculator.html" class="active">计算器</a></li>
        <li><a href="backtest.html">回测</a></li>
        <li><a href="settings.html">设置</a></li>
        <li><a href="about.html">关于</a></li>
      </ul>
    </nav>
  </header>

  <main class="main">
    <h1 class="page-title">🧮 投资计算器</h1>

    <!-- 定投计算器 -->
    <section class="calculator-section" id="sip-calculator">
      <h2>📅 定投计算器</h2>
      <div class="form-group">
        <label>每月投入金额（元）</label>
        <input type="number" id="sip-amount" value="1000" min="0" step="100">
      </div>
      <div class="form-group">
        <label>投资年限（年）</label>
        <input type="number" id="sip-years" value="10" min="1" max="50">
      </div>
      <div class="form-group">
        <label>预计年化收益率（%）</label>
        <input type="number" id="sip-rate" value="8" min="0" max="100" step="0.1">
      </div>
      <button class="btn btn-primary" onclick="calculateSIP()">计算</button>
      <div class="result-box" id="sip-result" style="display: none;">
        <div class="result-item">
          <span class="result-label">总投入本金</span>
          <span class="result-value" id="sip-principal">-</span>
        </div>
        <div class="result-item">
          <span class="result-label">最终账户价值</span>
          <span class="result-value" id="sip-final">-</span>
        </div>
        <div class="result-item">
          <span class="result-label">总收益</span>
          <span class="result-value" id="sip-profit">-</span>
        </div>
        <div class="result-item">
          <span class="result-label">总收益率</span>
          <span class="result-value" id="sip-return">-</span>
        </div>
        <div class="chart-container">
          <canvas id="sip-chart"></canvas>
        </div>
      </div>
    </section>

    <!-- 复利计算器 -->
    <section class="calculator-section" id="compound-calculator">
      <h2>💹 复利计算器</h2>
      <div class="form-group">
        <label>初始本金（元）</label>
        <input type="number" id="compound-principal" value="100000" min="0">
      </div>
      <div class="form-group">
        <label>年化收益率（%）</label>
        <input type="number" id="compound-rate" value="10" min="0" max="100" step="0.1">
      </div>
      <div class="form-group">
        <label>投资年限（年）</label>
        <input type="number" id="compound-years" value="20" min="1" max="50">
      </div>
      <button class="btn btn-primary" onclick="calculateCompound()">计算</button>
      <div class="result-box" id="compound-result" style="display: none;">
        <div class="result-item">
          <span class="result-label">最终本息总额</span>
          <span class="result-value" id="compound-final">-</span>
        </div>
        <div class="result-item">
          <span class="result-label">收益总额</span>
          <span class="result-value" id="compound-profit">-</span>
        </div>
        <div class="chart-container">
          <canvas id="compound-chart"></canvas>
        </div>
      </div>
    </section>

    <!-- 股票收益计算器 -->
    <section class="calculator-section" id="stock-calculator">
      <h3>📈 股票收益计算器</h3>
      <div class="form-group">
        <label>买入价格（元）</label>
        <input type="number" id="stock-buy-price" value="10.5" min="0" step="0.01">
      </div>
      <div class="form-group">
        <label>卖出价格（元）</label>
        <input type="number" id="stock-sell-price" value="12.3" min="0" step="0.01">
      </div>
      <div class="form-group">
        <label>买入数量（股）</label>
        <input type="number" id="stock-quantity" value="1000" min="0">
      </div>
      <div class="form-group">
        <label>手续费率（默认万3）</label>
        <input type="number" id="stock-fee-rate" value="0.03" min="0" max="10" step="0.01">
      </div>
      <div class="form-group">
        <label>印花税率（默认千1，卖出）</label>
        <input type="number" id="stock-stamp-rate" value="0.1" min="0" max="10" step="0.01">
      </div>
      <button class="btn btn-primary" onclick="calculateStock()">计算</button>
      <div class="result-box" id="stock-result" style="display: none;">
        <div class="result-item">
          <span class="result-label">买入成本</span>
          <span class="result-value" id="stock-buy-cost">-</span>
        </div>
        <div class="result-item">
          <span class="result-label">卖出收入</span>
          <span class="result-value" id="stock-sell-income">-</span>
        </div>
        <div class="result-item">
          <span class="result-label">手续费</span>
          <span class="result-value" id="stock-fee">-</span>
        </div>
        <div class="result-item">
          <span class="result-label">印花税</span>
          <span class="result-value" id="stock-stamp">-</span>
        </div>
        <div class="result-item">
          <span class="result-label">净利润</span>
          <span class="result-value" id="stock-net-profit">-</span>
        </div>
        <div class="result-item">
          <span class="result-label">收益率</span>
          <span class="result-value" id="stock-return">-</span>
        </div>
      </div>
    </section>

    <!-- PE估值计算器 -->
    <section class="calculator-section" id="pe-calculator">
      <h3>🔍 PE 估值计算器</h3>
      <div class="form-group">
        <label>每股收益 EPS（元）</label>
        <input type="number" id="pe-eps" value="1.5" min="0" step="0.01">
      </div>
      <div class="form-group">
        <label>行业平均 PE</label>
        <input type="number" id="pe-industry" value="25" min="0">
      </div>
      <button class="btn btn-primary" onclick="calculatePE()">计算</button>
      <div class="result-box" id="pe-result" style="display: none;">
        <div class="result-item">
          <span class="result-label">合理价格</span>
          <span class="result-value" id="pe-price">-</span>
        </div>
        <div class="result-item">
          <span class="result-label">价格区间（±20%）</span>
          <span class="result-value" id="pe-range">-</span>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>© 2026 金融计算器 & 股票回测平台</p>
    <p style="margin-top: 0.5rem; font-size: 0.85rem;">
      👥 访问人数：<span id="busuanzi_container_site_pv"><span id="busuanzi_value_site_pv">-</span></span>
    </p>
  </footer>

  <!-- 不蒜子计数器 -->
  <script async src="//busuanzi.icodeq.com/busuanzi.pure.mini.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="js/theme.js?v=20260310"></script>
  <script src="js/main.js?v=20260310"></script>
  <script src="js/calculator.js?v=20260310"></script>
</body>
</html>
